name: pace
description: A modern habit and activity tracking app.
publish_to: 'none'
version: 1.0.7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # Charts
  fl_chart: ^0.68.0

  # Fonts (loaded at runtime via package)
  google_fonts: ^6.2.1

  # UI
  flex_color_scheme: ^8.4.0
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.0.7
  workmanager: ^0.9.0+3
  timezone: ^0.9.4

  # File I/O / sharing
  share_plus: ^8.0.2
  file_picker: ^8.0.3
  intl: ^0.19.0
  http: ^1.2.1
  package_info_plus: ^8.0.0
  shared_preferences: ^2.3.2
  path: ^1.9.0
  open_filex: ^4.5.1
  flutter_markdown: ^0.7.2+1
  android_intent_plus: ^6.0.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
