name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required for Android toolchain) ─────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter SDK ───────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Isar code generation ──────────────────────────────────────────────
      - name: Generate Isar schemas
        run: dart run build_runner build --delete-conflicting-outputs

      # ── Extract version from tag (strips leading 'v') ─────────────────────
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Build release APK ─────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.VERSION }} \
            --build-number=${{ github.run_number }}

      # ── Rename APK with version ───────────────────────────────────────────
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/pace-v${{ steps.version.outputs.VERSION }}.apk

      # ── Create GitHub Release and upload APK ─────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Pace v${{ steps.version.outputs.VERSION }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/pace-v${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
