name: Android Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          set -euo pipefail
          TAG_NAME=${GITHUB_REF_NAME:-manual}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/pace-$TAG_NAME.apk

      - name: Verify APK output
        run: |
          set -euo pipefail
          ls -la build/app/outputs/flutter-apk/
          test -f build/app/outputs/flutter-apk/pace-${GITHUB_REF_NAME:-manual}.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pace-Artifacts
          path: build/app/outputs/flutter-apk/pace-*.apk

      - name: Prepare Release Notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"
          NOTES_DIR=".github/release-notes"
          NOTES_FILE="${NOTES_DIR}/${TAG_NAME}.md"
          OUT_FILE="release_notes.md"

          mkdir -p "$NOTES_DIR"

          # Priority 1: Explicit notes file for this tag.
          if [[ -f "$NOTES_FILE" ]] && [[ -n "$(tr -d '[:space:]' < "$NOTES_FILE")" ]]; then
            cp "$NOTES_FILE" "$OUT_FILE"
            exit 0
          fi

          # Priority 2: Annotated tag message.
          TAG_MESSAGE="$(git for-each-ref "refs/tags/${TAG_NAME}" --format='%(contents)')"
          if [[ -n "$(printf '%s' "$TAG_MESSAGE" | tr -d '[:space:]')" ]]; then
            printf '%s\n' "$TAG_MESSAGE" > "$OUT_FILE"
            exit 0
          fi

          # Priority 3: Generated commit summary between previous tag and this tag.
          PREV_TAG="$(git tag --sort=-creatordate | grep -Fxv "$TAG_NAME" | head -n1 || true)"

          {
            echo "## ${TAG_NAME}"
            echo
            echo "What's new:"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              git log --pretty='- %s' "${PREV_TAG}..${TAG_NAME}" | head -n 40
            else
              git log --pretty='- %s' -n 20
            fi
          } > "$OUT_FILE"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/pace-*.apk
          body_path: release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
